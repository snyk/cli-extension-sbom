version: "2"

run:
  build-tags:
    - integration
  concurrency: 4
  issues-exit-code: 1
  tests: true
  timeout: 5m

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - dogsled
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - forcetypeassert
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - interfacebloat
    - ireturn
    - lll
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      ignore-calls: false
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
      disable:
        - fieldalignment
    ireturn:
      allow:
        - error
        - github.com/snyk/go-application-framework/pkg/workflow.Data
    lll:
      line-length: 160
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    promlinter:
      strict: true
    staticcheck:
      checks: ["all", "-ST1003", "-ST1000"]
  exclusions:
    paths:
      - internal/mocks
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - goconst
          - ireturn
      - path: internal/view/(.+)_test\.go
        linters:
          - testpackage

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/snyk/cli-extension-sbom
